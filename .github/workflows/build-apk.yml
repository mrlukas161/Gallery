name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "fastlane/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build foss debug APK
        run: ./gradlew assembleFossDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gallery-foss-debug-apk
          path: app/build/outputs/apk/foss/debug/*.apk
          if-no-files-found: error